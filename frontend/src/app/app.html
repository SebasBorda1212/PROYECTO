<app-encabezado (logoClick)="resetSelection()" />

<main>
  @if (auth.isLoggedIn$ | async) {
    <div class="admin-toolbar" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 30px;">
      <button class="btn-admin" (click)="toggleUsuarios()" [style.border-bottom]="seccionActiva === 'usuarios' ? '2px solid #20c997' : 'none'">
        👥 Gestionar Usuarios
      </button>
      <button class="btn-admin" (click)="toggleAdmins()" [style.border-bottom]="seccionActiva === 'admins' ? '2px solid #ffd700' : 'none'">
        🛡️ Gestionar Admins
      </button>
    </div>

    <!-- Secciones Dinámicas -->
    <div *ngIf="seccionActiva === 'usuarios'" class="admin-section fade-in">
        <app-gestor-usuarios />
    </div>

    <div *ngIf="seccionActiva === 'admins'" class="admin-section fade-in">
        <app-gestor-admins />
    </div>
  }

  <ul id="usuarios">
    @for (usuario of usuarios; track usuario.id) {
      <li style="position: relative;">
        <app-usuario
          [seleccionado]="usuario.id === idUsuarioSeleccionado"
          [usuario]="usuario"
          (seleccion)="alSeleccionarUsuario($event)"
        />
      </li>
    }
  </ul>

  @if (usuarioSeleccionado) {
    <app-tareas [idUsuario]="usuarioSeleccionado.id" [nombre]="usuarioSeleccionado.nombre" />
  } @else {
    <p id="textoCondicional">Selecciona un usuario de la lista</p>
  }

</main>
