<div class="gestor-container">
    <div class="header">
      <h3>👥 Gestión de Perfiles</h3>
      <button class="btn-nuevo" (click)="abrirCrear()">+ Nuevo Perfil</button>
    </div>
  
    <div class="grid-usuarios">
      @for (u of usuariosService.usuarios(); track u.id) {
        <div class="user-card">
          <div class="user-info">
            <img [src]="u.avatar" class="avatar-mini" alt="User">
            <span class="user-name">{{ u.nombre }}</span>
          </div>
          <button class="btn-edit-mini" (click)="abrirEditar(u)">✎</button>
        </div>
      }
    </div>
  </div>
  
  <!-- Modal para crear/editar (Existente) -->
  @if (isOpen()) {
    <div class="modal-backdrop">
      <div class="modal-content">
        <div class="modal-header">
          <h2>{{ editingUser() ? '📝 Editar Perfil' : '🆕 Nuevo Perfil' }}</h2>
          <button class="close-btn" (click)="cerrarModal()">×</button>
        </div>
  
        <div class="modal-body">
          <div class="form-group">
            <label>Nombre del Usuario</label>
            <input type="text" [(ngModel)]="formData.nombre" placeholder="Ej. Juan Pérez" />
          </div>
  
          <div class="form-group">
            <label>Seleccionar Avatar</label>
            <div class="avatar-catalog">
              @for (avatarUrl of catalog; track avatarUrl) {
                <img 
                  [src]="avatarUrl" 
                  [class.selected]="formData.avatar === avatarUrl"
                  (click)="seleccionarAvatar(avatarUrl)"
                  alt="Avatar" />
              }
            </div>
          </div>
        </div>
  
        <div class="modal-footer">
          @if (editingUser()) {
            <button class="btn btn-danger" (click)="eliminar()">🗑️ Eliminar</button>
          }
          <button class="btn btn-secondary" (click)="cerrarModal()">Cancelar</button>
          <button class="btn btn-primary" (click)="guardar()" [disabled]="!formData.nombre || !formData.avatar">
            Guardar
          </button>
        </div>
      </div>
    </div>
  }
